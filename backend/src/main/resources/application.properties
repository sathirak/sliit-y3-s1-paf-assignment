# ---- Server ----
server.port=8080

# ---- MongoDB Atlas ----
spring.data.mongodb.uri=mongodb+srv://smartcampus:smartcampus2026@cluster0.fjvp8gf.mongodb.net/smart_campus?retryWrites=true&w=majority&appName=Cluster0
spring.data.mongodb.database=smart_campus

# ---- JWT ----
app.jwt.secret=YourSuperSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLongSmartCampus2026
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ---- OAuth2 - Google Sign-In (uncomment when ready) ----
# spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
# spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
# spring.security.oauth2.client.registration.google.scope=openid,profile,email
# spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/oauth2/callback/{registrationId}

# ---- File Upload ----
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=15MB

# ---- Email (Mailtrap — catches emails without sending) ----
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=${MAILTRAP_USERNAME:your_mailtrap_username}
spring.mail.password=${MAILTRAP_PASSWORD:your_mailtrap_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ---- CORS ----
app.cors.allowed-origins=http://localhost:5173

# ---- Logging ----
logging.level.com.smartcampus=DEBUG
