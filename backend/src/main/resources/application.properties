# ==========================================
# Smart Campus Operations Hub - Configuration
# ==========================================
# All secrets are read from the .env file via ${env.VAR_NAME}
# See .env.example for the list of required variables

# ---- Server ----
server.port=8080

# ---- MongoDB Atlas ----
spring.data.mongodb.uri=${env.MONGODB_URI}
spring.data.mongodb.database=smart_campus

# ---- JWT ----
app.jwt.secret=${env.JWT_SECRET}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ---- OAuth2 - Google Sign-In ----
spring.security.oauth2.client.registration.google.client-id=${env.GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${env.GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/oauth2/callback/{registrationId}

# ---- File Upload (for ticket image attachments) ----
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=15MB

# ---- Email Notifications (Mailtrap / SendGrid) ----
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=${env.MAIL_USERNAME}
spring.mail.password=${env.MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ---- CORS ----
app.cors.allowed-origins=http://localhost:5173

# ---- Logging ----
logging.level.com.smartcampus=DEBUG
